# ============================================
# DRIVER STATS SERVICE — Deployment
# ============================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: driver-stats-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: driver-stats
  template:
    metadata:
      labels:
        app: driver-stats
    spec:
      serviceAccountName: driver-stats-sa
      dnsPolicy: "None"
      dnsConfig:
        nameservers:
          - 10.96.0.10
          - 8.8.8.8
        searches:
          - default.svc.cluster.local
          - svc.cluster.local
          - cluster.local
      containers:
        - name: driver-stats-container
          image: aminedelim/driver-stats-service:1
          imagePullPolicy: Always
          ports:
            - containerPort: 3001

---
# ============================================
# DRIVER STATS SERVICE — Service
# ============================================
apiVersion: v1
kind: Service
metadata:
  name: driver-stats-service
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 80
      targetPort: 3001
  selector:
    app: driver-stats

---
