---
# ============================================
# INGRESS — Gateway unique
# ============================================
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: f1-ingress
spec:
  ingressClassName: nginx
  rules:
    - host: f1.local
      http:
        paths:
          - path: /drivers
            pathType: Prefix
            backend:
              service:
                name: driver-stats-service
                port:
                  number: 80
          - path: /races
            pathType: Prefix
            backend:
              service:
                name: race-stats-service
                port:
                  number: 80
          - path: /teams
            pathType: Prefix
            backend:
              service:
                name: team-stats-service
                port:
                  number: 80
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend-service
                port:
                  number: 80
        
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend-container
          image: aminedelim/f1-frontend:1
          imagePullPolicy: Always
          ports:
            - containerPort: 80

---
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 80
      targetPort: 80
  selector:
    app: frontend
